
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide India Tours | Heritage, Trust, Excellence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#8B5E3C', // Sandstone Brown
                dark: '#1F2933',    // Deep Charcoal
                bg: '#FAF7F2',      // Taj Ivory
                gold: '#C9A227',    // Heritage Gold
                success: '#16A34A',
                info: '#4338CA',
                error: '#DC2626'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif']
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FAF7F2;
        color: #1F2933;
      }
      .playfair { font-family: 'Playfair Display', serif; }
      .inter { font-family: 'Inter', sans-serif; }
      
      /* Accessibility: Focus styles */
      *:focus-visible {
        outline: 2px solid #8B5E3C;
        outline-offset: 4px;
      }

      /* Hide scrollbar but keep functionality for horizontal scrolls */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
