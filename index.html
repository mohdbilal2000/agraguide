
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Guide India Tours | Heritage & Luxury Golden Triangle Tours</title>
    <meta name="description" content="Premium heritage tours in Agra, Delhi, and Jaipur. Book government-approved local experts for Taj Mahal and Golden Triangle experiences." />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Guide India Tours" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#8B5E3C',
                dark: '#1A1A1A',
                bg: '#FAF7F2',
                gold: '#C9A227',
                success: '#16A34A',
                accent: '#E5D5C5',
                info: '#2563EB'
              }
            },
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              serif: ['Playfair Display', 'serif']
            }
          }
        }
      }
    </script>
    <style type="text/css">
      /* RESET & STABILITY */
      :root {
        --brand-bg: #FAF7F2;
        --brand-dark: #1A1A1A;
        --brand-primary: #8B5E3C;
      }
      * { 
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        background-color: var(--brand-bg);
        color: var(--brand-dark);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        width: 100%;
        font-family: 'Plus Jakarta Sans', sans-serif;
        line-height: 1.5;
      }
      .playfair { font-family: 'Playfair Display', serif !important; }
      .jakarta { font-family: 'Plus Jakarta Sans', sans-serif !important; }
      
      .page-container {
        width: 100%;
        max-width: 1280px;
        margin-left: auto;
        margin-right: auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      @media (min-width: 768px) {
        .page-container {
          padding-left: 2rem;
          padding-right: 2rem;
        }
      }

      .hero-overlay {
        background: linear-gradient(to right, rgba(26,26,26,0.9) 0%, rgba(26,26,26,0.4) 50%, transparent 100%);
      }
      
      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }
    </style>
  </head>
  <body class="jakarta">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
